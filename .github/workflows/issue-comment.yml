name: Issue Auto Comment

on:
  issues:
    types: [opened]

jobs:
  comment:
    runs-on: ubuntu-latest

    steps:
      - name: Add comment to new issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Thank you for raising this issue! 🚀

We’ll review it as soon as possible.

Please ensure the issue is not a duplicate and make sure to read the CONTRIBUTING.md guidelines before contributing.

Your support and contributions to ElderEase are highly appreciated 💙`
            })
